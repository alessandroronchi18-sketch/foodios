<!DOCTYPE html>

  <head>

    <!-- Performance hints: anticipa DNS resolution + handshake TLS verso
         Supabase. Anche se l'URL effettivo è dinamico via env, il TLD principale
         supabase.co è prevedibile. Risparmio ~120ms sul primo fetch dati. -->
    <link rel="dns-prefetch" href="https://supabase.co">
    <link rel="dns-prefetch" href="https://api.anthropic.com">
    <link rel="dns-prefetch" href="https://api.stripe.com">
    <link rel="dns-prefetch" href="https://js.stripe.com">
    <!-- Preload Inter 400+600 (più usati) per evitare FOIT -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="https://fonts.gstatic.com/s/inter/v18/UcCo3FwrK3iLTcvneQg7Ca725JhhKnNqk4j1ebLhAm8SrXTc2tysFlYrwg.woff2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
        font-optical-sizing: auto;
        text-rendering: optimizeLegibility;
        color: #0E1726;
        background: #F8FAFC;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .tnum, .fos-num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum', 'cv11', 'ss01'; }
      h1, h2, h3, h4, h5, h6, p { margin: 0; }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.35); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.55); }
      @keyframes _fos_pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes _fos_fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .fos-page { animation: _fos_pageIn 0.22s ease-out; }
      .fos-fade { animation: _fos_fadeIn 0.18s ease-out; }
      @media (max-width: 767px) {
        input, textarea, select { font-size: 16px !important; }
        table { width: 100%; }
      }

      /* ───────────────────────────────────────────────────────────────
         A11Y: focus-visible globale per utenti tastiera.
         Solo quando l'elemento riceve focus via tastiera (non click).
      */
      :focus-visible {
        /* !important per vincere sugli `outline:none` inline diffusi nei
           componenti: senza, l'indicatore di focus da tastiera sparirebbe. */
        outline: 2px solid #6E0E1A !important;
        outline-offset: 2px;
      }
      /* Bottoni/anchor con focus mouse: niente outline (UX coerente) */
      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible),
      textarea:focus:not(:focus-visible),
      select:focus:not(:focus-visible) {
        outline: none;
      }

      /* ───────────────────────────────────────────────────────────────
         iOS Safari: rispetta safe-area (notch, home indicator).
      */
      @supports (padding: env(safe-area-inset-bottom)) {
        body { padding-bottom: env(safe-area-inset-bottom, 0); }
      }

      /* Scroll smooth nativo (Safari supporta da v15.4) */
      html { scroll-behavior: smooth; }

      /* ───────────────────────────────────────────────────────────────
         A11Y: rispetta "riduci movimento" (sensibilità vestibolare).
         Neutralizza animazioni/transizioni globali, incluse quelle inline.
      */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Selezione testo: usa brand bordeaux invece di blu sistema */
      ::selection { background: rgba(110, 14, 26, 0.18); color: #1C0A0A; }

      /* Prevenire highlight blu su tap mobile (UX nativa) */
      * { -webkit-tap-highlight-color: rgba(110, 14, 26, 0.06); }

      /* Anti-flash bianco se l'utente ha dark mode (placeholder per il futuro) */
      @media (prefers-color-scheme: dark) {
        html, body { background: #F8FAFC; color: #0E1726; }
      }

      /* Touch target minimo 44px su mobile per bottoni standalone (icon-only).
         I bottoni in form usano lo style del componente. */
      @media (max-width: 767px) {
        button[aria-label]:not([class*="inline"]) {
          min-width: 44px;
          min-height: 44px;
        }
      }

      /* ───────────────────────────────────────────────────────────────
         BOOT SPLASH — pre-React, identico visivamente a <SplashScreen/>
         Renderizzato dal browser PRIMA che il JS bundle parta. Garantisce
         che il caricamento sia sempre il design corrente anche con bundle
         JS cachato vecchio (Service Worker SWR). Si rimuove auto quando
         React popola #root (MutationObserver inline a fondo body).
      */
      #boot-splash {
        position: fixed; inset: 0; z-index: 2147483600;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 22px;
        background: radial-gradient(ellipse at 50% 35%, #1A0A0E 0%, #0B0407 55%, #050203 100%);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      }
      #boot-splash::before, #boot-splash::after {
        content: ''; position: absolute; left: 50%;
        filter: blur(40px); pointer-events: none;
      }
      #boot-splash::before {
        top: 20%;
        width: min(720px, 90vw); height: min(720px, 90vw);
        margin-left: calc(min(720px, 90vw) / -2);
        background: radial-gradient(circle, rgba(232,75,58,0.45) 0%, rgba(110,14,26,0) 65%);
        animation: _bs_aurora 14s ease-in-out infinite;
      }
      #boot-splash::after {
        top: 40%;
        width: min(560px, 80vw); height: min(560px, 80vw);
        margin-left: calc(min(560px, 80vw) / -2);
        background: radial-gradient(circle, rgba(255,179,80,0.32) 0%, rgba(110,14,26,0) 65%);
        filter: blur(48px);
        animation: _bs_aurora2 18s ease-in-out infinite;
      }
      @keyframes _bs_aurora {
        0%   { transform: translate(-20%, -10%) rotate(0deg);   opacity: 0.55 }
        50%  { transform: translate(15%, 10%)  rotate(180deg);  opacity: 0.85 }
        100% { transform: translate(-20%, -10%) rotate(360deg); opacity: 0.55 }
      }
      @keyframes _bs_aurora2 {
        0%   { transform: translate(20%, 15%)   rotate(0deg);    opacity: 0.4 }
        50%  { transform: translate(-15%, -10%) rotate(-180deg); opacity: 0.7 }
        100% { transform: translate(20%, 15%)   rotate(-360deg); opacity: 0.4 }
      }
      .bs-brick { position: relative; width: 64px; height: 64px; z-index: 1; }
      @media (max-width: 480px) { .bs-brick { width: 48px; height: 48px } }
      @media (min-width: 481px) and (max-width: 899px) { .bs-brick { width: 56px; height: 56px } }
      .bs-halo {
        position: absolute; inset: -14px; border-radius: 50%;
        background: radial-gradient(circle, rgba(232,75,58,0.55) 0%, rgba(110,14,26,0) 70%);
        filter: blur(10px); pointer-events: none;
        animation: _bs_halo 2.4s ease-in-out infinite;
      }
      @keyframes _bs_halo {
        0%, 100% { opacity: 0.55; transform: scale(1) }
        50%      { opacity: 0.95; transform: scale(1.08) }
      }
      .bs-ring {
        position: absolute; inset: -3px; border-radius: 16px;
        background: conic-gradient(from 0deg, #E84B3A 0deg, #FFB350 90deg, #6E0E1A 180deg, #FF7B5A 270deg, #E84B3A 360deg);
        filter: blur(0.5px); opacity: 0.9; pointer-events: none;
        -webkit-mask: radial-gradient(circle, transparent calc(50% - 1px), black 50%);
        mask:        radial-gradient(circle, transparent calc(50% - 1px), black 50%);
        animation: _bs_ring 4.5s linear infinite;
      }
      @keyframes _bs_ring { to { transform: rotate(360deg) } }
      .bs-logo {
        position: relative; z-index: 1; width: 100%; height: 100%;
        border-radius: 14px; display: block;
        box-shadow: 0 18px 48px rgba(110,14,26,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
      }
      .bs-text { z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .bs-wordmark {
        font-size: 26px; font-weight: 800; letter-spacing: -0.025em; line-height: 1;
        background-image: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0.65) 100%);
        background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      @media (max-width: 480px) { .bs-wordmark { font-size: 22px } }
      .bs-tagline {
        display: flex; align-items: center; gap: 6px;
        font-size: 12px; color: rgba(255,255,255,0.55); font-weight: 600;
        letter-spacing: 0.14em; text-transform: uppercase;
      }
      .bs-dot { display: inline-block; animation: _bs_dots 1.2s ease-in-out infinite; }
      .bs-dot:nth-of-type(2) { animation-delay: 0.15s }
      .bs-dot:nth-of-type(3) { animation-delay: 0.30s }
      @keyframes _bs_dots {
        0%, 80%, 100% { opacity: 0.25; transform: translateY(0) }
        40%           { opacity: 1;    transform: translateY(-3px) }
      }
      .bs-bar {
        position: relative; width: min(220px, 60vw); height: 2px;
        background: rgba(255,255,255,0.06); border-radius: 2px;
        overflow: hidden; margin-top: 4px; z-index: 1;
      }
      .bs-bar::after {
        content: ''; position: absolute; inset: 0; width: 60%;
        background: linear-gradient(90deg, transparent 0%, #FFB350 50%, transparent 100%);
        animation: _bs_bar 1.6s cubic-bezier(.65,.05,.36,1) infinite;
      }
      @keyframes _bs_bar {
        0%   { transform: translateX(-110%) }
        100% { transform: translateX(110%) }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash, #boot-splash::before, #boot-splash::after,
        .bs-halo, .bs-ring, .bs-bar::after, .bs-dot { animation: none !important }
      }
      /* Fade out quando React monta. */
      html.app-mounted #boot-splash {
        opacity: 0; pointer-events: none;
        transition: opacity 220ms ease;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="bs-brick">
        <span class="bs-halo"></span>
        <span class="bs-ring"></span>
        <svg class="bs-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Foodos">
          <path fill="#6E0E1A" d="M 14 0 L 50 0 C 58 0 64 6 64 14 L 64 50 C 64 58 58 64 50 64 L 14 64 C 6 64 0 58 0 50 L 0 14 C 0 6 6 0 14 0 Z"/>
          <path fill="#FFFFFF" d="M 19 14 L 49 14 L 49 23 L 29 23 L 29 29 L 44 29 L 44 37 L 29 37 L 29 50 L 19 50 Z"/>
        </svg>
      </div>
      <div class="bs-text">
        <div class="bs-wordmark">Foodos</div>
        <div class="bs-tagline">
          <span>Caricamento</span>
          <span class="bs-dot">·</span>
          <span class="bs-dot">·</span>
          <span class="bs-dot">·</span>
        </div>
      </div>
      <div class="bs-bar"></div>
    </div>
    <div id="root"></div>
    <script>
      // Boot splash removal + stuck-app recovery.
      //
      // Happy path: appena React popola #root, marka html.app-mounted
      // (fade-out CSS), poi rimuove il nodo dopo la transition.
      //
      // Recovery path: se dopo 9s React NON ha montato, l'app è stuck (chunk
      // 404, JS errato in cache, SW corrotto, network lentissima). Mostriamo
      // un pulsante "Riprova" che pulisce SW + cache + reload hard, così
      // l'utente esce dal limbo senza dover sapere cos'è un service worker.
      (function() {
        var root = document.getElementById('root');
        var splash = document.getElementById('boot-splash');
        if (!root || !splash) return;
        var removed = false;
        function remove() {
          if (removed) return; removed = true;
          document.documentElement.classList.add('app-mounted');
          setTimeout(function () { try { splash.parentNode && splash.parentNode.removeChild(splash); } catch(e){} }, 260);
        }
        function showRecovery() {
          if (removed) return; // React è montato, nessun recovery
          if (document.getElementById('boot-recovery')) return;
          var box = document.createElement('div');
          box.id = 'boot-recovery';
          box.style.cssText = 'position:absolute;bottom:8%;left:50%;transform:translateX(-50%);z-index:2147483601;'
            + 'display:flex;flex-direction:column;align-items:center;gap:10px;'
            + 'font-family:Inter,system-ui,sans-serif;color:rgba(255,255,255,0.9);text-align:center;';
          var msg = document.createElement('div');
          msg.style.cssText = 'font-size:13px;color:rgba(255,255,255,0.65);max-width:300px;line-height:1.5';
          msg.textContent = 'Caricamento più lento del solito. Se non si sblocca, riprova.';
          var btn = document.createElement('button');
          btn.textContent = 'Riprova';
          btn.style.cssText = 'padding:11px 22px;border-radius:10px;border:1px solid rgba(255,255,255,0.18);'
            + 'background:#6E0E1A;color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;'
            + 'box-shadow:0 8px 22px rgba(110,14,26,0.45);font-family:inherit;letterSpacing:0.02em';
          btn.onclick = function() {
            btn.disabled = true; btn.textContent = 'Ripulisco…';
            // 1) Unregister tutti i SW. 2) Cancella tutte le cache. 3) Reload.
            var p = Promise.resolve();
            try {
              if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
                p = navigator.serviceWorker.getRegistrations().then(function(rs){
                  return Promise.all(rs.map(function(r){ return r.unregister(); }));
                });
              }
            } catch(e){}
            p.then(function(){
              try { if (typeof caches !== 'undefined' && caches.keys) {
                return caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); });
              } } catch(e){}
            }).finally(function(){
              try { sessionStorage.removeItem('foodios_sw_reload_ts'); } catch(e){}
              try { sessionStorage.removeItem('foodos_chunk_reload_ts'); } catch(e){}
              window.location.reload();
            });
          };
          box.appendChild(msg); box.appendChild(btn);
          splash.appendChild(box);
        }
        if (root.children.length > 0) { remove(); return; }
        var obs = new MutationObserver(function () {
          if (root.children.length > 0) { obs.disconnect(); remove(); }
        });
        obs.observe(root, { childList: true });
        // 9s: a questo punto se React non è montato, mostra "Riprova".
        // Non rimuoviamo lo splash (un blank fa peggio): mostriamo la via d'uscita.
        setTimeout(showRecovery, 9000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
