name: Playwright E2E

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          # Node 22+: serve il WebSocket nativo richiesto da @supabase/supabase-js
          # (global-setup/helper creano il client). Su Node 20 createClient lancia.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://foodios-rose.vercel.app' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_SIGNUP_DOMAIN: ${{ vars.TEST_SIGNUP_DOMAIN }}
          # global-setup.js usa la service key per seminare ricetta + leggere orgId
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # anon key (pubblica) per il sign-in utente nei test RLS / stock PF
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          # opzionali per il test positivo Stripe (altrimenti skipped)
          STRIPE_WEBHOOK_SECRET_TEST: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
          STRIPE_SECRET_KEY_TEST: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          TEST_ORG_ID: ${{ vars.TEST_ORG_ID }}
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures
          path: test-results/
          retention-days: 30
