name: Unit tests

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  unit:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build (sanity)
        run: npm run build
