name: Unit tests

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  unit:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Lint (ESLint flat config) — fail on errors, tolerate warnings
        run: npx eslint src/ --max-warnings 200
      - name: Unit tests (Vitest, ~1300 test in <60s)
        run: npm test
      - name: Build (sanity)
        run: npm run build
