name: Deploy to Vercel (production)

# Trigger: ogni push su main. Bypassa il webhook Vercel→GitHub nativo
# usando direttamente il Vercel CLI con un token. Setup richiede 3 secrets
# nel repo (Settings → Secrets and variables → Actions):
#   - VERCEL_TOKEN     (https://vercel.com/account/tokens, scope = team)
#   - VERCEL_ORG_ID    = team_RZlJbGitJJVh938CtFAUuu4F
#   - VERCEL_PROJECT_ID = prj_Zej05sGvXorZDVJvOFsBga356wS3

on:
  push:
    branches:
      - main
  workflow_dispatch:  # consente di triggerare manualmente dalla UI Actions

concurrency:
  # Annulla deploy in corso se ne arriva uno nuovo (push rapidi consecutivi)
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Opt-in a Node 24 (default da settembre 2026, evita warning deprecation)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build project (Vercel-style)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"

      - name: Promote alias foodios-rose.vercel.app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          # Estrai hostname dal URL completo (rimuove https://)
          HOST="${DEPLOY_URL#https://}"
          vercel alias set "$HOST" foodios-rose.vercel.app --token=$VERCEL_TOKEN

      - name: Summary
        run: |
          echo "## ✅ Deploy completato" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ steps.deploy.outputs.deploy_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Alias prod**: https://foodios-rose.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
